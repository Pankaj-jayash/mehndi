<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Niraj With Mehndi</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-section {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: var(--bg);
        }
        .error-content h1 { font-size: 80px; color: var(--accent); margin-bottom: 10px; }
        .error-content h2 { font-size: 28px; margin-bottom: 15px; }
        .error-content p { color: var(--gray); margin-bottom: 30px; font-size: 18px; }
        .error-icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <section class="error-section">
        <div class="error-content">
            <div class="error-icon">🎨</div>
            <h1>404</h1>
            <h2>Oops! Page Not Found</h2>
            <p>Looks like this mehndi design doesn't exist!<br>Let's get you back to beautiful designs.</p>
            <div style="display:flex;gap:15px;justify-content:center;flex-wrap:wrap;">
                <a href="index.html" class="btn btn-primary">🏠 Go Home</a>
                <a href="gallery.html" class="btn btn-accent">📸 Browse Gallery</a>
            </div>
        </div>
    </section>

    <footer class="footer" id="footer"></footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadConfig();
            loadNavbar('none');
            loadFooter();
        });
    </script>
</body>
</html>
